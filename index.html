
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>퀴즈 시스템</title>

<style>
/* ===== 기본 리셋 ===== */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

/* ===== 전체 레이아웃 ===== */
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f5f7fb;
  padding: 16px;
  display: flex;
  justify-content: center;
}

/* ===== 컨테이너 ===== */
.container {
  width: 100%;
  max-width: 720px;
}

/* ===== 카드 ===== */
.card {
  background: white;
  border-radius: 14px;
  padding: 18px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);
  margin-bottom: 16px;
  overflow: hidden;
}

/* ===== 제목 ===== */
h2 {
  font-size: 18px;
  margin-bottom: 10px;
}

h3 {
  font-size: 16px;
  line-height: 1.4;
}

/* ===== select + 버튼 ===== */
select, button, textarea {
  font-size: 14px;
  border-radius: 10px;
}

select {
  padding: 10px;
  border: 1px solid #ddd;
}

#startBtn {
  background: #4CAF50;
  color: white;
  margin-left: 8px;
  padding: 10px 14px;
  cursor: pointer;
}

/* ===== 상태 ===== */
#status {
  font-size: 13px;
  color: #666;
  margin-bottom: 10px;
}

/* ===== 선택지 ===== */
.choice {
  display: block;
  width: 100%;
  text-align: left;
  padding: 12px;
  margin: 6px 0;
  border-radius: 10px;
  border: 1px solid #ddd;
  background: #fafafa;
  cursor: pointer;
  transition: 0.15s;
}

.choice:hover {
  background: #e8f0ff;
  border-color: #4a90e2;
}

/* ===== 결과 ===== */
.correct {
  color: #2ecc71;
  font-weight: bold;
  margin-top: 10px;
}

.wrong {
  color: #e74c3c;
  font-weight: bold;
  margin-top: 10px;
}

/* ===== textarea ===== */
textarea {
  width: 100%;
  max-width: 100%;
  margin-top: 10px;
  border: 1px solid #ddd;
  padding: 10px;
  resize: none;      /* 🔥 크기 변경 금지 */
  overflow: auto;
  border-radius: 10px;
}

/* ===== 버튼 그룹 ===== */
.action-buttons {
  margin-top: 12px;
}

.action-buttons button {
  margin-right: 8px;
  padding: 10px 14px;
  cursor: pointer;
}

#check {
  background: #3498db;
  color: white;
}

#correctBtn {
  background: #2ecc71;
  color: white;
}

#wrongBtn {
  background: #e74c3c;
  color: white;
}

/* ===== 다음 버튼 (하단 고정 느낌) ===== */
#nextWrapper {
  position: sticky;
  bottom: 0;
  background: #f5f7fb;
  padding-top: 10px;
}

#nextBtn {
  width: 100%;
  background: #111;
  color: white;
  padding: 14px;
  font-size: 15px;
  border-radius: 30px;
  display: none;
  cursor: pointer;
}

/* ===== 모바일 최적화 ===== */
@media (max-width: 480px) {

  body {
    padding: 12px;
  }

  .card {
    padding: 14px;
  }

  h2 {
    font-size: 16px;
  }

  h3 {
    font-size: 15px;
  }

  .choice {
    font-size: 13px;
    padding: 10px;
  }

  textarea {
    font-size: 13px;
  }

  #startBtn {
    padding: 8px 12px;
    font-size: 13px;
  }
}
</style>
</head>

<body>

<div class="container">

<div class="card">
  <h2>과목 선택</h2>
  <select id="subjectSelect">
    <option value="">과목 선택</option>
  </select>
  <button id="startBtn">시작</button>
</div>

<div class="card">
  <div id="status"></div>

  <h3 id="question"></h3>
  <div id="choices"></div>

  <textarea id="input" style="display:none;"></textarea>

  <div class="action-buttons">
    <button id="check" style="display:none;">정답 확인</button>
    <button id="correctBtn" style="display:none;">맞음</button>
    <button id="wrongBtn" style="display:none;">틀림</button>
  </div>

  <div id="result"></div>
</div>

<div id="nextWrapper">
  <button id="nextBtn">다음 문제 →</button>
</div>

</div>

<script src="./quiz/questions.js"></script>

<script>

/* 상태 */
let questions=[], TOTAL=0;
let mainSet=[], wrongSet=[], idx=0;
let solvedSet=new Set();
let correctSet=new Set();

/* DOM */
const status=document.getElementById("status");
const qEl=document.getElementById("question");
const cEl=document.getElementById("choices");
const input=document.getElementById("input");
const check=document.getElementById("check");
const correctBtn=document.getElementById("correctBtn");
const wrongBtn=document.getElementById("wrongBtn");
const nextBtn=document.getElementById("nextBtn");
const result=document.getElementById("result");
const select=document.getElementById("subjectSelect");
const startBtn=document.getElementById("startBtn");

/* 과목 자동 생성 */
window.onload=()=>{
  Object.keys(window.questions).forEach(subject=>{
    let opt=document.createElement("option");
    opt.value=subject;
    opt.innerText=subject;
    select.appendChild(opt);
  });
};

/* 시작 */
startBtn.onclick=()=>{
  const chosen=select.value;
  if(!chosen) return alert("과목 선택해라");
  initQuiz(window.questions[chosen]);
};

/* 초기화 */
function initQuiz(qs){
  questions=[...qs];
  TOTAL=questions.length;

  mainSet=[...questions].sort(()=>Math.random()-0.5);
  wrongSet=[];
  idx=0;

  solvedSet.clear();
  correctSet.clear();

  loadQ();
}

/* 상태 */
function updateStatus(){
  let correct=correctSet.size;
  let rate=Math.round((correct/TOTAL)*100);
  status.innerText=`진행률: ${solvedSet.size}/${TOTAL} | 정답률: ${rate}%`;
}

/* 문제 로드 */
function loadQ(){

  if(correctSet.size===TOTAL){
    qEl.innerText="🎉 완료!";
    cEl.innerHTML="";
    nextBtn.style.display="none";
    return;
  }

  if(idx>=mainSet.length){
    mainSet=[...wrongSet].sort(()=>Math.random()-0.5);
    wrongSet=[];
    idx=0;
  }

  let q=mainSet[idx];

  result.innerText="";
  cEl.innerHTML="";
  input.style.display="none";
  check.style.display="none";
  correctBtn.style.display="none";
  wrongBtn.style.display="none";
  nextBtn.style.display="none";

  /* 문제 표시 */
  if(q.type === "code"){
    qEl.innerHTML = `<pre>${q.q}</pre>`;
  }else{
    qEl.innerText = q.q;
  }

  /* 객관식 */
  if(q.type === "mc"){
    q.c.forEach((v,i)=>{
      let b=document.createElement("button");
      b.className="choice";
      b.innerText=v;
      b.onclick=()=>handleMC(i,q);
      cEl.appendChild(b);
    });
  }

  /* 주관식 / short */
  else if(q.type === "sub" || q.type === "short"){
    input.style.display="block";
    input.style.height="60px";
    check.style.display="inline";

    check.onclick=()=>{
      result.innerText="정답: "+q.a;
      result.className="correct";
      correctBtn.style.display="inline";
      wrongBtn.style.display="inline";
    };

    correctBtn.onclick=()=>after(q,true);
    wrongBtn.onclick=()=>{ wrongSet.push(q); after(q,false); };
  }

  /* 코드 문제 */
  else if(q.type === "code"){
    input.style.display="block";
    input.style.height="150px";
    check.style.display="inline";

    check.onclick=()=>{
      result.innerText="정답:\n"+q.a;
      result.className="correct";
      correctBtn.style.display="inline";
      wrongBtn.style.display="inline";
    };

    correctBtn.onclick=()=>after(q,true);
    wrongBtn.onclick=()=>{ wrongSet.push(q); after(q,false); };
  }

  updateStatus();
}

/* 객관식 처리 */
function handleMC(i,q){
  if(i===q.a){
    result.innerText="정답!";
    result.className="correct";
    after(q,true);
  }else{
    result.innerText="틀림!";
    result.className="wrong";
    wrongSet.push(q);
    after(q,false);
  }
}

/* 공통 처리 */
function after(q,isCorrect){
  if(isCorrect) correctSet.add(q.id);
  solvedSet.add(q.id);

  nextBtn.style.display="inline";

  nextBtn.onclick=()=>{
    idx++;
    loadQ();
  };

  updateStatus();
}

</script>

</body>
</html>
